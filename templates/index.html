<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate Roadmap — Student Success Copilot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="page-wrapper">

    <!-- Navbar -->
    <nav class="navbar">
        <a href="/dashboard" class="navbar-brand">
            <div class="brand-icon">
                <i class="fas fa-graduation-cap"></i>
            </div>
            <span>Student Success Copilot</span>
        </a>
        <div class="navbar-actions">
            <a href="/my-roadmaps" class="nav-pill">
                <i class="fas fa-map"></i>
                My Roadmaps
            </a>
            <a href="/logout" class="nav-pill danger">
                <i class="fas fa-right-from-bracket"></i>
                Logout
            </a>
        </div>
    </nav>

    <!-- Dashboard layout -->
    <div class="dashboard-layout">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-label">Navigation</div>

            <a href="/dashboard" class="sidebar-link">
                <i class="fas fa-house"></i>
                <span>Dashboard</span>
            </a>

            <a href="/generate-roadmap" class="sidebar-link active">
                <i class="fas fa-wand-magic-sparkles"></i>
                <span>Generate Roadmap</span>
            </a>

            <a href="/my-roadmaps" class="sidebar-link">
                <i class="fas fa-map-location-dot"></i>
                <span>My Roadmaps</span>
            </a>

            <div class="sidebar-label">Account</div>

            <a href="/logout" class="sidebar-link danger">
                <i class="fas fa-right-from-bracket"></i>
                <span>Logout</span>
            </a>
        </aside>

        <!-- Main content: generator -->
        <main style="padding: 2rem; overflow-y: auto;">

            <div style="max-width: 1100px; margin: 0 auto;">

                <!-- Page title -->
                <div style="margin-bottom: 1.5rem;">
                    <h2 style="font-size: 1.4rem; font-weight: 700; display: flex; align-items: center; gap: 10px;">
                        <span style="background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">
                            <i class="fas fa-wand-magic-sparkles"></i>
                        </span>
                        Generate Your Roadmap
                    </h2>
                    <p style="font-size: 13px; color: var(--text-secondary); margin-top: 4px;">Fill in your details and let AI build your personalized study plan.</p>
                </div>

                <!-- Two-column layout -->
                <div class="generator-layout" style="padding: 0;">

                    <!-- Input panel -->
                    <div class="generator-panel">
                        <div class="panel-header">
                            <h3><i class="fas fa-sliders"></i> Your Profile</h3>
                            <p>Tell us about yourself</p>
                        </div>

                        <div class="container">

                            <div class="form-group">
                                <label for="name">Full Name</label>
                                <div class="input-wrapper">
                                    <i class="fas fa-user"></i>
                                    <input type="text" id="name" placeholder="Enter your name">
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="branch">Branch / Department</label>
                                <div class="input-wrapper">
                                    <i class="fas fa-microchip"></i>
                                    <select id="branch">
                                        <option>ECE</option>
                                        <option>CSE</option>
                                        <option>EEE</option>
                                        <option>MECH</option>
                                        <option>CIVIL</option>
                                    </select>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="year">Academic Year</label>
                                <div class="input-wrapper">
                                    <i class="fas fa-calendar-days"></i>
                                    <select id="year">
                                        <option>1</option>
                                        <option>2</option>
                                        <option>3</option>
                                        <option>4</option>
                                    </select>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="cgpa">Current CGPA</label>
                                <div class="input-wrapper">
                                    <i class="fas fa-star"></i>
                                    <input type="number" id="cgpa" placeholder="e.g. 8.5" step="0.1" min="0" max="10">
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="interest">Area of Interest</label>
                                <div class="input-wrapper">
                                    <i class="fas fa-fire"></i>
                                    <select id="interest">
                                        <option>AI</option>
                                        <option>Embedded Systems</option>
                                        <option>VLSI</option>
                                        <option>IoT</option>
                                        <option>Software Development</option>
                                    </select>
                                </div>
                            </div>

                            <div style="margin-top: 1.5rem;">
                                <button onclick="generateRoadmap()" class="btn btn-primary">
                                    <i class="fas fa-bolt"></i>
                                    Generate My Roadmap
                                </button>
                            </div>

                        </div>
                    </div>

                    <!-- Output panel -->
                    <div>
                        <div class="generator-panel" style="min-height: 420px;">
                            <div class="panel-header">
                                <h3><i class="fas fa-map"></i> Your Roadmap</h3>
                                <p>AI-generated personalized plan</p>
                            </div>
                            <div id="output"></div>
                        </div>
                    </div>

                </div>
            </div>
        </main>
    </div>

</div>

<script>
    async function generateRoadmap() {

        let name = document.getElementById("name").value;
        let branch = document.getElementById("branch").value;
        let year = document.getElementById("year").value;
        let cgpa = document.getElementById("cgpa").value;
        let interest = document.getElementById("interest").value;

        const outputEl = document.getElementById("output");
        outputEl.innerHTML = '<div class="generating-text">Generating your personalized roadmap...</div>';

        let response = await fetch("/roadmap", {

            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                name: name,
                branch: branch,
                year: year,
                cgpa: cgpa,
                interest: interest
            })

        });

        let data = await response.json();

document.getElementById("output").innerHTML = marked.parse(data.roadmap);
    }
</script>

</body>
</html>
